version = 1

[module]
name = "paper"
tags = ["planning", "research", "paper"]

[exports]
entry = "task.paper-start"
ready = "task.paper-ready"

[contract]
required = [
  "paper-canonicalize.mmd",
  "paper-deep-read.mmd",
  "paper-compare.mmd",
]

[[graph]]
path = "paper-canonicalize.mmd"
name = "PAPER_CANONICALIZE"
topology = "bounded_loop"

[graph.workdir]
note = "`qianji check` evaluates this bounded run-local surface before canonical paper objects are merged."
root = "runs/<run_id>"

[graph.workdir.check]
require = [
  "qianji.toml",
  "flowchart.mmd",
  "refs/paper.json",
  "state/current_node.toml",
  "state/trace.jsonl",
  "state/allowed_next.json",
  "checkpoints/pdf_intake.json",
  "checkpoints/pdf_sniff.json",
  "checkpoints/text_pass.json",
  "checkpoints/layout_regions_extract.json",
  "checkpoints/vision_patch_loop.json",
  "checkpoints/section_link.json",
  "checkpoints/citation_link.json",
  "checkpoints/figure_table_index.json",
  "staging/source/envelope.patch.json",
  "staging/source/page_index.patch.json",
  "staging/extraction/text_pass.patch.json",
  "staging/extraction/layout_regions.patch.json",
  "staging/extraction/vision_patches.patch.jsonl",
  "staging/structure/section_tree.patch.json",
  "staging/structure/figure_index.patch.json",
  "staging/structure/table_index.patch.json",
  "staging/structure/equation_index.patch.json",
  "staging/structure/reference_index.patch.json",
  "staging/structure/citation_graph.patch.json",
  "diagnostics/latest_check.md",
  "diagnostics/blocked.json",
  "diagnostics/failed.json",
  "outputs/response_preview.md",
]
flowchart = [
  "state",
  "checkpoints",
  "staging",
]

[graph.workdir.target]
root = "papers/<paper_id>"
paths = [
  "source/envelope.json",
  "source/pages/",
  "extraction/text_pass.json",
  "extraction/layout_regions.json",
  "extraction/vision_patches.jsonl",
  "structure/section_tree.json",
  "structure/figure_index.json",
  "structure/table_index.json",
  "structure/equation_index.json",
  "structure/reference_index.json",
  "structure/citation_graph.json",
]

[[graph.node]]
label = "research/paper"
kind = "artifact"
role = "define the persistent single-paper knowledge package surface"
agent_action = "materialize and update the persistent papers/<paper_id>/ package"

[[graph.node]]
label = "pdf_intake"
kind = "process"
role = "register the paper source package"
agent_action = "register source inputs and create the initial paper source envelope"

[[graph.node]]
label = "pdf_sniff"
kind = "process"
role = "inspect the paper and choose the extraction path"
agent_action = "inspect the source paper and select the extraction path"

[[graph.node]]
label = "text_pass"
kind = "process"
role = "materialize the first text extraction pass"
agent_action = "materialize the first extraction pass under papers/<paper_id>/extraction/"

[[graph.node]]
label = "layout_regions_extract"
kind = "process"
role = "materialize page layout regions and anchors"
agent_action = "materialize page layout regions and anchors into the paper extraction surface"

[[graph.node]]
label = "vision_patch_loop"
kind = "process"
role = "repair low-confidence extraction regions"
agent_action = "repair low-confidence layout or text regions with visual patches"

[[graph.node]]
label = "section_link"
kind = "process"
role = "materialize the section tree and section anchors"
agent_action = "materialize section_tree.json and section anchors"

[[graph.node]]
label = "citation_link"
kind = "process"
role = "materialize the reference index and citation graph"
agent_action = "materialize reference_index.json and citation_graph.json"

[[graph.node]]
label = "figure_table_index"
kind = "process"
role = "materialize figure, table, and equation indexes"
agent_action = "materialize figure, table, and equation indexes"

[[graph.node]]
label = "canonicalize_done"
kind = "artifact"
role = "define the ready canonical paper package"
agent_action = "treat papers/<paper_id>/source, extraction, and structure as ready"

[[graph.node]]
label = "done gate"
kind = "gate"
role = "allow completion only when required guards and validators pass"
agent_action = "do not treat the slice as complete before qianji check passes"

[[graph.node]]
label = "diagnostics"
kind = "process"
role = "capture blocking diagnostics for bounded-surface repair"
agent_action = "use diagnostics to repair the bounded work surface before retrying"

[[graph]]
path = "paper-deep-read.mmd"
name = "PAPER_DEEP_READ"
topology = "bounded_loop"

[[graph]]
path = "paper-compare.mmd"
name = "PAPER_COMPARE"
topology = "bounded_loop"

[graph.workdir]
note = "`qianji check` evaluates this bounded comparison run before validated outputs are merged into the persistent topic package."
root = "runs/<run_id>"

[graph.workdir.check]
require = [
  "qianji.toml",
  "flowchart.mmd",
  "refs/topic.json",
  "refs/paper_set.json",
  "state/current_node.toml",
  "state/trace.jsonl",
  "state/allowed_next.json",
  "checkpoints/load_topic_corpus.json",
  "checkpoints/align_schema.json",
  "checkpoints/compare_methods.json",
  "checkpoints/compare_results.json",
  "checkpoints/contradiction_detect.json",
  "checkpoints/gap_extract.json",
  "checkpoints/review_outline.json",
  "staging/comparison/method_matrix.patch.csv",
  "staging/comparison/result_matrix.patch.csv",
  "staging/comparison/benchmark_grid.patch.csv",
  "staging/notebook/contradiction_map.patch.jsonl",
  "staging/notebook/gap_log.patch.md",
  "staging/notebook/research_gap_memo.patch.md",
  "staging/syntheses/literature_review_outline.patch.md",
  "staging/syntheses/state_of_field.patch.md",
  "diagnostics/latest_check.md",
  "diagnostics/blocked.json",
  "diagnostics/failed.json",
  "outputs/response_preview.md",
]
flowchart = [
  "state",
  "checkpoints",
  "staging",
]

[graph.workdir.target]
root = "topics/<topic_id>"
paths = [
  "comparison/method_matrix.csv",
  "comparison/result_matrix.csv",
  "comparison/benchmark_grid.csv",
  "notebook/contradiction_map.jsonl",
  "notebook/gap_log.md",
  "notebook/research_gap_memo.md",
  "syntheses/literature_review_outline.md",
  "syntheses/state_of_field.md",
]

[[graph.node]]
label = "research/paper"
kind = "artifact"
role = "define the persistent single-paper knowledge packages used for comparison"
agent_action = "treat the paper packages as the comparison inputs for the topic slice"

[[graph.node]]
label = "load_topic_corpus"
kind = "process"
role = "load the topic corpus and aligned paper packages"
agent_action = "load topic paper refs and the aligned paper packages"

[[graph.node]]
label = "align_schema"
kind = "process"
role = "align one comparison schema across the topic corpus"
agent_action = "align comparison schema across the topic corpus"

[[graph.node]]
label = "compare_methods"
kind = "process"
role = "materialize the cross-paper method comparison surface"
agent_action = "materialize method_matrix.csv"

[[graph.node]]
label = "compare_results"
kind = "process"
role = "materialize the cross-paper result comparison surface"
agent_action = "materialize result_matrix.csv and benchmark_grid.csv"

[[graph.node]]
label = "contradiction_detect"
kind = "process"
role = "materialize contradiction findings across the corpus"
agent_action = "materialize contradiction_map.jsonl"

[[graph.node]]
label = "gap_extract"
kind = "process"
role = "materialize topic gap findings"
agent_action = "materialize gap_log.md and research_gap_memo.md"

[[graph.node]]
label = "review_outline"
kind = "process"
role = "materialize the topic review synthesis"
agent_action = "materialize literature_review_outline.md and state_of_field.md"

[[graph.node]]
label = "compare_done"
kind = "artifact"
role = "define the ready topic comparison package"
agent_action = "treat topics/<topic_id>/comparison and syntheses as ready"

[[graph.node]]
label = "done gate"
kind = "gate"
role = "allow completion only when required guards and validators pass"
agent_action = "do not treat the slice as complete before qianji check passes"

[[graph.node]]
label = "diagnostics"
kind = "process"
role = "capture blocking diagnostics for bounded-surface repair"
agent_action = "use diagnostics to repair the bounded work surface before retrying"
